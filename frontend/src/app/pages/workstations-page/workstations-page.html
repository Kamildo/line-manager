<div class="w-page">
  <!-- LEFT PANEL -->
  <aside class="w-sidebar">
    <header class="w-sidebar__header">
      <h2 class="w-sidebar__title">Workstations</h2>
    </header>
    <div class="w-filters">
      <div class="al-filters__row">
        <div class="form-field">
          <label class="form-label">Name</label>
          <input class="form-input" type="text" placeholder="Search by name…"
                 [(ngModel)]="filters.name" (ngModelChange)="onFilterChange()" />
        </div>
        <div class="form-field">
          <label class="form-label">Short name</label>
          <input class="form-input" type="text" placeholder="Search by short name…"
                 [(ngModel)]="filters.short_name" (ngModelChange)="onFilterChange()" />
        </div>
        <div class="form-field">
          <label class="form-label">Pc name</label>
          <input class="form-input" type="text" placeholder="Search by pc name…"
                 [(ngModel)]="filters.pc_name" (ngModelChange)="onFilterChange()" />
        </div>
      </div>
        <div class="form-field form-field--inline">
          <label class="form-label">Has assemly line</label>
          <select class="form-select" [(ngModel)]="filters.hasAssigned" (ngModelChange)="onFilterChange()">
            <option [ngValue]="null">All</option>
            <option [ngValue]="true">Yes</option>
            <option [ngValue]="false">No</option>
          </select>
        </div>
      </div>
      <ul class="w-list">
        <li *ngFor="let product of filteredWorkstations"
            class="w-list__item"
            [class.p-list__item--selected]="selectedWorkstation?.id === product.id"
            (dblclick)="onSelectWorkstation(product)">
          <span class="w-list__name">{{ product.name }}</span>
        </li>
        <li *ngIf="filteredWorkstations.length === 0" class="p-list__empty">No products found</li>
      </ul>
</aside>
  <!-- RIGHT PANEL -->
  <main class="w-detail">
    <section class="al-detail__section">
      <h3 class="al-detail__section-title">
        {{ selectedWorkstation ? 'Workstations Details' : 'Workstation' }}
      </h3>
      <div class="detail-form">
        <div class="form-field">
          <label class="form-label">Name</label>
          <input class="form-input" type="text"
                 [(ngModel)]="editForm.name"
                 [disabled]="!isEditing && !!selectedWorkstation"
                 placeholder="Workstation name" />
        </div>
        <div class="form-field">
          <label class="form-label">Short name</label>
          <input class="form-input" type="text"
                 [(ngModel)]="editForm.short_name"
                 [disabled]="!isEditing && !!selectedWorkstation"
                 placeholder="Workstation short name" />
        </div>
        <div class="form-field">
          <label class="form-label">Pc name</label>
          <input class="form-input" type="text"
                 [(ngModel)]="editForm.pc_name"
                 [disabled]="!isEditing && !!selectedWorkstation"
                 placeholder="Workstation pc name" />
        </div>
      </div>
    </section>
    <div class="al-detail__actions">
      <ng-container *ngIf="!selectedWorkstation">
        <button class="btn btn--primary" (click)="onAddNew()">Add New</button>
        <button class="btn btn--ghost" (click)="onCancel()">Cancel</button>
      </ng-container>
      <ng-container *ngIf="selectedWorkstation && !isEditing">
        <button class="btn btn--secondary" (click)="onEdit()">Edit</button>
        <button class="btn btn--danger" (click)="onDelete()">Delete</button>
        <button class="btn btn--primary" (click)="onAddNew()">Add New</button>
      </ng-container>
      <ng-container *ngIf="isEditing">
        <button class="btn btn--primary" (click)="onSave()">Save</button>
        <button class="btn btn--ghost" (click)="onCancel()">Cancel</button>
      </ng-container>
    </div>

    <section class="al-detail__section" *ngIf="selectedWorkstation">
      <h3 class="al-detail__section-title">Assemly lines</h3>
      <ul class="ws-list" *ngIf="selectedLines.length > 0; else noLines">
        <li *ngFor="let ws of selectedLines" class="ws-list__item">
          <span class="ws-list__name">{{ ws.name }}</span>
          <span class="ws-list__short">{{ ws.active }}</span>
        </li>
      </ul>
      <ng-template #noLines>
        <span class="al-detail__empty-text">No assemly lines assigned</span>
      </ng-template>
    </section>

  </main>
</div>
